name: Auto Scrape & Update Jobs

on:
  schedule:
    # Runs every day at 07:00 UTC (= 08:00 Maroc heure été)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run scraper + AI rewriter
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Commit updated database to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f web/jobs.db
          git diff --staged --quiet || git commit -m "auto: update jobs.db with latest scraped jobs [skip ci]"
          git push
