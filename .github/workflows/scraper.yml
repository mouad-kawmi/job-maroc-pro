name: Job Scraper Automation

on:
  schedule:
    # Run every 6 hours automatically (00:00, 06:00, 12:00, 18:00)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger by clicking a button in Github

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Job Scraper
        env:
          # Your dev needs to put the Gemini Key in Github Secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and push changes to Database
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add web/jobs.db
          # Git will only commit and push if there are actual new jobs added to the database.
          # This push will automatically tell Vercel to rebuild and publish the new jobs!
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update jobs database" && git push)
